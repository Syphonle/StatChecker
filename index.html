<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LoL Post-Game Stats</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0e1015; color: #cdd2e0; min-height: 100vh; padding: 24px 16px; }
  h1 { font-size: 20px; font-weight: 500; color: #e8ecf5; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
  .setup { background: #181b23; border: 1px solid #2a2e3a; border-radius: 10px; padding: 16px; margin-bottom: 24px; display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; color: #6b7280; }
  input, select { background: #0e1015; border: 1px solid #2a2e3a; border-radius: 6px; color: #cdd2e0; padding: 8px 10px; font-size: 14px; outline: none; }
  input:focus, select:focus { border-color: #4a6fa5; }
  .key-wrap { display: flex; align-items: center; gap: 6px; }
  .key-wrap input { width: 280px; }
  .eye-btn { background: none; border: none; color: #6b7280; cursor: pointer; font-size: 16px; padding: 4px; }
  .region-sel { width: 100px; }
  .summoners { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 8px; flex: 1 1 100%; }
  .summoners input { width: 100%; }
  button.search { background: #2563eb; border: none; border-radius: 6px; color: #fff; cursor: pointer; font-size: 14px; font-weight: 500; padding: 9px 20px; white-space: nowrap; }
  button.search:disabled { opacity: 0.5; cursor: not-allowed; }
  .error { background: #2d1515; border: 1px solid #7f1d1d; border-radius: 8px; color: #fca5a5; font-size: 13px; padding: 10px 14px; margin-bottom: 16px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
  .card { background: #181b23; border: 1px solid #2a2e3a; border-radius: 10px; padding: 14px; }
  .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; background: #2a2e3a; flex-shrink: 0; }
  .avatar-fallback { width: 44px; height: 44px; border-radius: 50%; background: #2a2e3a; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 500; color: #6b7280; flex-shrink: 0; }
  .name { font-size: 15px; font-weight: 500; color: #e8ecf5; }
  .level { font-size: 12px; color: #6b7280; }
  .rank-badge { font-size: 12px; padding: 3px 8px; border-radius: 5px; background: #23283a; display: inline-block; margin-bottom: 10px; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 12px; }
  .stat { background: #0e1015; border-radius: 6px; padding: 8px; text-align: center; }
  .stat-label { font-size: 11px; color: #6b7280; margin-bottom: 2px; }
  .stat-value { font-size: 15px; font-weight: 500; }
  .champs { margin-top: 10px; }
  .champ-title { font-size: 12px; color: #6b7280; margin-bottom: 6px; }
  .champ-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .champ-icon { width: 28px; height: 28px; border-radius: 4px; object-fit: cover; background: #2a2e3a; }
  .champ-name { font-size: 13px; color: #cdd2e0; flex: 1; }
  .champ-stats { font-size: 12px; text-align: right; }
  .wr-bar-wrap { width: 50px; height: 5px; background: #2a2e3a; border-radius: 3px; overflow: hidden; }
  .wr-bar { height: 100%; border-radius: 3px; }
  .loading { text-align: center; padding: 40px; color: #6b7280; font-size: 14px; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #2a2e3a; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .green { color: #34d399; } .blue { color: #60a5fa; } .gray { color: #9ca3af; } .red { color: #f87171; }
  .step { font-size: 12px; color: #6b7280; text-align: center; margin-top: 8px; }
</style>
</head>
<body>

<h1>⚔️ LoL Post-Game Team Stats</h1>
<p class="sub">Enter your team's summoner names to review everyone's performance</p>

<div class="setup">
  <div class="field">
    <label>Riot API Key</label>
    <div class="key-wrap">
      <input type="password" id="apiKey" placeholder="RGAPI-…" />
      <button class="eye-btn" onclick="toggleKey()" title="Show/hide key">👁</button>
    </div>
  </div>
  <div class="field">
    <label>Region</label>
    <select class="region-sel" id="region">
      <option value="na1|americas">NA1</option>
      <option value="euw1|europe">EUW1</option>
      <option value="kr|asia">KR</option>
      <option value="eune1|europe">EUNE1</option>
      <option value="br1|americas">BR1</option>
      <option value="jp1|asia">JP1</option>
      <option value="la1|americas">LA1</option>
      <option value="la2|americas">LA2</option>
      <option value="oc1|sea">OC1</option>
      <option value="tr1|europe">TR1</option>
      <option value="ru|europe">RU</option>
    </select>
  </div>
  <div class="field" style="flex:1 1 100%">
    <label>Summoner Names (up to 5 — use Name#TAG format)</label>
    <div class="summoners">
      <input type="text" class="sname" placeholder="Player 1 (you)" />
      <input type="text" class="sname" placeholder="Player 2" />
      <input type="text" class="sname" placeholder="Player 3" />
      <input type="text" class="sname" placeholder="Player 4" />
      <input type="text" class="sname" placeholder="Player 5" />
    </div>
  </div>
  <button class="search" onclick="fetchAll()" id="searchBtn">🔍 Fetch Stats</button>
</div>

<div id="error" class="error" style="display:none"></div>
<div id="loading" class="loading" style="display:none"><span class="spinner"></span>Loading…<div class="step" id="stepText"></div></div>
<div id="results" class="grid"></div>

<script>
const QUEUE_MAP = {420:"Ranked Solo",440:"Ranked Flex",450:"ARAM",400:"Normal Draft",430:"Normal Blind"};

function kdaColor(v) { return v>=4?"#34d399":v>=3?"#60a5fa":v>=2?"#9ca3af":"#f87171"; }
function wrColor(v) { return v>=60?"#34d399":v>=50?"#60a5fa":"#f87171"; }
function tierColor(t) {
  if(!t) return "#9ca3af";
  const s=t.toLowerCase();
  if(["challenger","grandmaster","master"].some(x=>s.includes(x))) return "#fbbf24";
  if(s.includes("diamond")||s.includes("emerald")) return "#67e8f9";
  if(s.includes("platinum")) return "#6ee7b7";
  if(s.includes("gold")) return "#fbbf24";
  if(s.includes("silver")) return "#d1d5db";
  if(s.includes("bronze")) return "#d97706";
  return "#a78bfa";
}

function toggleKey() {
  const inp = document.getElementById("apiKey");
  inp.type = inp.type === "password" ? "text" : "password";
}

async function riotFetch(url, apiKey) {
  const res = await fetch(url, { headers: { "X-Riot-Token": apiKey } });
  if (res.status === 403) throw new Error("Invalid or expired API key (403)");
  if (res.status === 404) throw new Error("Summoner not found (404)");
  if (res.status === 429) throw new Error("Rate limit hit — wait a moment and retry (429)");
  if (!res.ok) throw new Error(`Request failed: ${res.status}`);
  return res.json();
}

async function fetchSummoner(name, apiKey, platform, routing) {
  let puuid, summonerData, displayName;
  const parts = name.trim().split("#");
  if (parts.length === 2) {
    const acct = await riotFetch(`https://${routing}.api.riotgames.com/riot/account/v1/accounts/by-riot-id/${encodeURIComponent(parts[0])}/${encodeURIComponent(parts[1])}`, apiKey);
    puuid = acct.puuid;
    displayName = `${acct.gameName}#${acct.tagLine}`;
    summonerData = await riotFetch(`https://${platform}.api.riotgames.com/lol/summoner/v4/summoners/by-puuid/${puuid}`, apiKey);
  } else {
    summonerData = await riotFetch(`https://${platform}.api.riotgames.com/lol/summoner/v4/summoners/by-name/${encodeURIComponent(name.trim())}`, apiKey);
    puuid = summonerData.puuid;
    displayName = summonerData.name;
  }

  const ranked = await riotFetch(`https://${platform}.api.riotgames.com/lol/league/v4/entries/by-summoner/${summonerData.id}`, apiKey);
  const solo = ranked.find(e => e.queueType === "RANKED_SOLO_5x5") || null;

  const matchIds = await riotFetch(`https://${routing}.api.riotgames.com/lol/match/v5/matches/by-puuid/${puuid}/ids?queue=420&start=0&count=10`, apiKey);
  const matchDetails = await Promise.all(matchIds.slice(0,10).map(id =>
    riotFetch(`https://${routing}.api.riotgames.com/lol/match/v5/matches/${id}`, apiKey)
  ));

  const matches = matchDetails.map(m => {
    const p = m.info.participants.find(x => x.puuid === puuid);
    if (!p) return null;
    const kda = p.deaths===0 ? p.kills+p.assists : (p.kills+p.assists)/p.deaths;
    return {
      champion: p.championName, result: p.win?"WIN":"LOSS",
      kills: p.kills, deaths: p.deaths, assists: p.assists,
      cs: p.totalMinionsKilled+p.neutralMinionsKilled,
      kda: parseFloat(kda.toFixed(2)),
      queue: QUEUE_MAP[m.info.queueId]||"Custom",
    };
  }).filter(Boolean);

  const champMap = {};
  matches.forEach(m => {
    if (!champMap[m.champion]) champMap[m.champion]={games:0,wins:0,kills:0,deaths:0,assists:0};
    champMap[m.champion].games++;
    if(m.result==="WIN") champMap[m.champion].wins++;
    champMap[m.champion].kills+=m.kills;
    champMap[m.champion].deaths+=m.deaths;
    champMap[m.champion].assists+=m.assists;
  });
  const topChamps = Object.entries(champMap).sort((a,b)=>b[1].games-a[1].games).slice(0,3).map(([name,s])=>({
    name, games:s.games,
    winRate: Math.round((s.wins/s.games)*100),
    kda: s.deaths===0 ? parseFloat((s.kills+s.assists).toFixed(2)) : parseFloat(((s.kills+s.assists)/s.deaths).toFixed(2)),
  }));

  const n = matches.length||1;
  const wins = matches.filter(m=>m.result==="WIN").length;
  const tK=matches.reduce((a,m)=>a+m.kills,0);
  const tD=matches.reduce((a,m)=>a+m.deaths,0);
  const tA=matches.reduce((a,m)=>a+m.assists,0);

  return {
    displayName, level: summonerData.summonerLevel, profileIconId: summonerData.profileIconId,
    solo,
    winRate: Math.round((wins/n)*100), wins, losses: n-wins,
    avgKDA: tD===0 ? parseFloat((tK+tA).toFixed(2)) : parseFloat(((tK+tA)/tD).toFixed(2)),
    avgKills: parseFloat((tK/n).toFixed(1)), avgDeaths: parseFloat((tD/n).toFixed(1)), avgAssists: parseFloat((tA/n).toFixed(1)),
    topChamps,
  };
}

function renderCard(p) {
  const rankLabel = p.solo ? `${p.solo.tier} ${p.solo.rank} — ${p.solo.leaguePoints} LP` : "Unranked";
  const rankCol = tierColor(p.solo?.tier);
  const champsHtml = p.topChamps.map(c => `
    <div class="champ-row">
      <img class="champ-icon" src="https://ddragon.leagueoflegends.com/cdn/14.10.1/img/champion/${c.name}.png" onerror="this.style.display='none'" alt="${c.name}">
      <span class="champ-name">${c.name}</span>
      <div class="champ-stats">
        <div style="color:${wrColor(c.winRate)};font-weight:500">${c.winRate}% WR</div>
        <div style="color:${kdaColor(c.kda)};font-size:11px">${c.kda} KDA</div>
      </div>
      <div class="wr-bar-wrap"><div class="wr-bar" style="width:${Math.min(c.winRate,100)}%;background:${wrColor(c.winRate)}"></div></div>
    </div>`).join("");

  return `
    <div class="card">
      <div class="card-header">
        <img class="avatar" src="https://ddragon.leagueoflegends.com/cdn/14.10.1/img/profileicon/${p.profileIconId}.png"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt="">
        <div class="avatar-fallback" style="display:none">${p.displayName[0].toUpperCase()}</div>
        <div>
          <div class="name">${p.displayName}</div>
          <div class="level">Level ${p.level}</div>
        </div>
      </div>
      <div class="rank-badge" style="color:${rankCol}">${rankLabel}</div>
      ${p.solo ? `<div style="font-size:11px;color:#6b7280;margin-bottom:10px">${p.solo.wins}W ${p.solo.losses}L this season</div>` : ""}
      <div class="stats-grid">
        <div class="stat"><div class="stat-label">Win Rate</div><div class="stat-value" style="color:${wrColor(p.winRate)}">${p.winRate}%</div></div>
        <div class="stat"><div class="stat-label">Avg KDA</div><div class="stat-value" style="color:${kdaColor(p.avgKDA)}">${p.avgKDA}</div></div>
        <div class="stat"><div class="stat-label">K/D/A</div><div class="stat-value" style="font-size:12px">${p.avgKills}/${p.avgDeaths}/${p.avgAssists}</div></div>
      </div>
      <div class="champs">
        <div class="champ-title">Top champions (last 10 ranked)</div>
        ${champsHtml}
      </div>
    </div>`;
}

async function fetchAll() {
  const apiKey = document.getElementById("apiKey").value.trim();
  const [platform, routing] = document.getElementById("region").value.split("|");
  const names = [...document.querySelectorAll(".sname")].map(i=>i.value.trim()).filter(Boolean);

  if (!apiKey) { showError("Please enter your Riot API key."); return; }
  if (names.length === 0) { showError("Enter at least one summoner name."); return; }

  document.getElementById("error").style.display = "none";
  document.getElementById("results").innerHTML = "";
  document.getElementById("loading").style.display = "block";
  document.getElementById("searchBtn").disabled = true;

  const cards = [];
  for (let i = 0; i < names.length; i++) {
    document.getElementById("stepText").textContent = `Fetching ${names[i]} (${i+1}/${names.length})…`;
    try {
      const p = await fetchSummoner(names[i], apiKey, platform, routing);
      cards.push(renderCard(p));
    } catch(e) {
      cards.push(`<div class="card"><div class="name" style="color:#f87171">${names[i]}</div><div style="font-size:13px;color:#f87171;margin-top:8px">${e.message}</div></div>`);
    }
  }

  document.getElementById("loading").style.display = "none";
  document.getElementById("searchBtn").disabled = false;
  document.getElementById("results").innerHTML = cards.join("");
}

function showError(msg) {
  const el = document.getElementById("error");
  el.textContent = msg;
  el.style.display = "block";
}
</script>
</body>
</html>
