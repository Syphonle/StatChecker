<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LoL Stat Checker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0e1015;color:#cdd2e0;min-height:100vh;padding:24px 16px;}
h1{font-size:20px;font-weight:500;color:#e8ecf5;margin-bottom:4px;}
.sub{font-size:13px;color:#6b7280;margin-bottom:20px;}
input,select{background:#0e1015;border:1px solid #2a2e3a;border-radius:6px;color:#cdd2e0;padding:8px 10px;font-size:14px;outline:none;}
input:focus,select:focus{border-color:#4a6fa5;}
button{cursor:pointer;border-radius:6px;font-size:14px;padding:8px 14px;border:1px solid #2a2e3a;background:#1d2535;color:#cdd2e0;}
button:hover{background:#2a2e3a;}
button.primary{background:#2563eb;border-color:#2563eb;color:#fff;font-weight:500;}
button.primary:hover{background:#1d4ed8;}
button.primary:disabled{opacity:0.5;cursor:not-allowed;}
button.danger{color:#f87171;border-color:#7f1d1d;}
button.danger:hover{background:#2d1515;}
button.expand-btn{background:#1a2535;border-color:#2a3a5a;color:#60a5fa;font-size:12px;padding:5px 10px;margin-top:8px;width:100%;text-align:left;display:flex;justify-content:space-between;align-items:center;}
button.expand-btn:hover{background:#1e3a5a;}
.panel{background:#181b23;border:1px solid #2a2e3a;border-radius:10px;padding:14px 16px;margin-bottom:16px;}
.panel-title{font-size:13px;color:#6b7280;margin-bottom:12px;}
.setup-grid{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:12px;color:#6b7280;}
.key-wrap{display:flex;align-items:center;gap:6px;}
.key-wrap input{width:260px;}
.eye-btn{background:none;border:none;color:#6b7280;font-size:16px;padding:4px;}
.summoners-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:8px;width:100%;}
.teams-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.teams-row select{flex:1;min-width:150px;}
.save-row{display:flex;gap:8px;align-items:center;flex:1 1 100%;}
.save-row input{flex:1;}
.error{background:#2d1515;border:1px solid #7f1d1d;border-radius:8px;color:#fca5a5;font-size:13px;padding:10px 14px;margin-bottom:14px;}
.loading{text-align:center;padding:40px;color:#6b7280;font-size:14px;}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid #2a2e3a;border-top-color:#2563eb;border-radius:50%;animation:spin 0.8s linear infinite;margin-right:8px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin-bottom:20px;}
.card{background:#181b23;border:1px solid #2a2e3a;border-radius:10px;padding:14px;}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.avatar{width:42px;height:42px;border-radius:50%;object-fit:cover;background:#2a2e3a;flex-shrink:0;}
.avatar-fb{width:42px;height:42px;border-radius:50%;background:#2a2e3a;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:500;color:#6b7280;flex-shrink:0;}
.pname{font-size:15px;font-weight:500;color:#e8ecf5;}
.plevel{font-size:12px;color:#6b7280;}
.grades-wrap{display:flex;flex-direction:column;gap:4px;flex-shrink:0;}
.grade-badge{font-size:16px;font-weight:700;width:52px;height:40px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.1s;line-height:1;}
.grade-badge:hover{transform:scale(1.06);}
.grade-label{font-size:9px;font-weight:400;opacity:0.7;margin-top:1px;}
.grade-score{font-size:10px;font-weight:400;opacity:0.8;}
.rank-badge{font-size:12px;padding:3px 8px;border-radius:5px;background:#23283a;display:inline-block;margin-bottom:8px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px;}
.stat{background:#0e1015;border-radius:6px;padding:7px;text-align:center;}
.stat-label{font-size:11px;color:#6b7280;margin-bottom:2px;}
.stat-val{font-size:15px;font-weight:500;}
.champ-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.champ-icon{width:26px;height:26px;border-radius:4px;object-fit:cover;background:#2a2e3a;}
.champ-name{font-size:13px;flex:1;}
.champ-wr{font-size:12px;text-align:right;}
.wr-bar-wrap{width:44px;height:5px;background:#2a2e3a;border-radius:3px;overflow:hidden;}
.wr-bar{height:100%;border-radius:3px;}
.mastery-pip{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#6b7280;margin-left:4px;}
.collapsible{display:none;margin-top:8px;border-top:1px solid #2a2e3a;padding-top:10px;}
.collapsible.open{display:block;}
.role-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid #1a1d25;font-size:12px;}
.role-row:last-child{border-bottom:none;}
.role-name{color:#9ca3af;width:70px;}
.role-stats{display:flex;gap:12px;}
.role-stat{text-align:center;}
.role-stat-label{font-size:10px;color:#6b7280;}
.role-stat-val{font-size:12px;font-weight:500;}
.tl-loading{font-size:12px;color:#6b7280;text-align:center;padding:12px 0;}
.graphs-section{margin-top:4px;}
.graphs-section h2{font-size:16px;font-weight:500;color:#e8ecf5;margin-bottom:14px;}
.graphs-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;}
.graph-card{background:#181b23;border:1px solid #2a2e3a;border-radius:10px;padding:14px;}
.graph-title{font-size:13px;color:#9ca3af;margin-bottom:12px;}
.chart-wrap{position:relative;width:100%;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;}
.modal{background:#181b23;border:1px solid #2a2e3a;border-radius:12px;width:100%;max-width:780px;max-height:90vh;overflow-y:auto;padding:20px;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.modal-title{font-size:16px;font-weight:500;color:#e8ecf5;}
.modal-close{background:none;border:none;color:#6b7280;font-size:20px;padding:4px 8px;line-height:1;}
.modal-close:hover{color:#e8ecf5;}
.modal-charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px;}
.modal-chart-card{background:#0e1015;border-radius:8px;padding:12px;}
.modal-chart-title{font-size:12px;color:#9ca3af;margin-bottom:8px;}
.benchmark-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.bench-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#6b7280;}
.bench-dot{width:8px;height:8px;border-radius:50%;}
.mode-tag{font-size:11px;padding:2px 7px;border-radius:4px;margin-bottom:10px;display:inline-block;}
</style>
</head>
<body>
<h1>⚔️ LoL Stat Checker</h1>
<p class="sub">Post-game team stats powered by the Riot Games API</p>

<div class="panel">
  <div class="panel-title">💾 Saved Teams</div>
  <div class="teams-row">
    <select id="teamSelect"><option value="">— select a team —</option></select>
    <button onclick="loadTeam()">Load</button>
    <button class="danger" onclick="deleteTeam()">Delete</button>
    <div class="save-row">
      <input type="text" id="teamName" placeholder="Team name…"/>
      <button onclick="saveTeam()">Save current</button>
    </div>
  </div>
</div>

<div class="panel">
  <div class="setup-grid">
    <div class="field">
      <label>Riot API Key</label>
      <div class="key-wrap">
        <input type="password" id="apiKey" placeholder="RGAPI-…" value="RGAPI-6c981526-41e7-4d06-946c-369022179f44
"/>
        <button class="eye-btn" onclick="toggleKey()">👁</button>
      </div>
    </div>
    <div class="field">
      <label>Region</label>
      <select id="region" style="width:100px">
        <option value="na1|americas">NA1</option>
        <option value="euw1|europe">EUW1</option>
        <option value="kr|asia">KR</option>
        <option value="eune1|europe">EUNE1</option>
        <option value="br1|americas">BR1</option>
        <option value="jp1|asia">JP1</option>
        <option value="la1|americas">LA1</option>
        <option value="la2|americas">LA2</option>
        <option value="oc1|sea">OC1</option>
        <option value="tr1|europe">TR1</option>
        <option value="ru|europe">RU</option>
      </select>
    </div>
    <div class="field" style="flex:1 1 100%">
      <label>Summoner Names (Name#TAG format)</label>
      <div class="summoners-grid">
        <input type="text" class="sname" placeholder="Player 1 (you)"/>
        <input type="text" class="sname" placeholder="Player 2"/>
        <input type="text" class="sname" placeholder="Player 3"/>
        <input type="text" class="sname" placeholder="Player 4"/>
        <input type="text" class="sname" placeholder="Player 5"/>
      </div>
    </div>
    <button class="primary" onclick="fetchAll()" id="searchBtn">🔍 Fetch Stats</button>
  </div>
</div>

<div id="error" class="error" style="display:none"></div>
<div id="loading" class="loading" style="display:none"><span class="spinner"></span><span id="stepText">Loading…</span></div>
<div id="output" style="display:none">
  <div class="cards-grid" id="cardsGrid"></div>
  <div class="graphs-section">
    <h2>📊 Team Overview</h2>
    <div class="graphs-grid">
      <div class="graph-card"><div class="graph-title">CS per minute</div><div class="chart-wrap" style="height:220px"><canvas id="chartCS" role="img" aria-label="CS per minute"></canvas></div></div>
      <div class="graph-card"><div class="graph-title">Damage per minute</div><div class="chart-wrap" style="height:220px"><canvas id="chartDPM" role="img" aria-label="Damage per minute"></canvas></div></div>
      <div class="graph-card"><div class="graph-title">KDA</div><div class="chart-wrap" style="height:220px"><canvas id="chartKDA" role="img" aria-label="KDA"></canvas></div></div>
      <div class="graph-card"><div class="graph-title">Kill participation %</div><div class="chart-wrap" style="height:220px"><canvas id="chartKP" role="img" aria-label="Kill participation"></canvas></div></div>
      <div class="graph-card"><div class="graph-title">Vision score per game</div><div class="chart-wrap" style="height:220px"><canvas id="chartVS" role="img" aria-label="Vision score"></canvas></div></div>
      <div class="graph-card"><div class="graph-title">Avg deaths per game</div><div class="chart-wrap" style="height:220px"><canvas id="chartDeaths" role="img" aria-label="Deaths per game"></canvas></div></div>
      <div class="graph-card"><div class="graph-title">Ranked score</div><div class="chart-wrap" style="height:220px"><canvas id="chartScoreR" role="img" aria-label="Ranked score"></canvas></div></div>
      <div class="graph-card"><div class="graph-title">Casual score</div><div class="chart-wrap" style="height:220px"><canvas id="chartScoreC" role="img" aria-label="Casual score"></canvas></div></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div style="display:flex;align-items:center;gap:10px">
        <span id="modalGrade" style="font-size:22px;font-weight:700;padding:6px 14px;border-radius:8px;margin-right:10px;"></span>
        <div>
          <div class="modal-title" id="modalName"></div>
          <div style="font-size:12px;color:#6b7280" id="modalRole"></div>
        </div>
      </div>
      <button class="modal-close" onclick="document.getElementById('modalOverlay').style.display='none'">✕</button>
    </div>
    <div class="modal-charts-grid" id="modalCharts"></div>
  </div>
</div>

<script>
const COLORS=["#60a5fa","#34d399","#fbbf24","#f87171","#c084fc"];
const ROLE_LABELS={TOP:"Top",JUNGLE:"Jungle",MIDDLE:"Mid",BOTTOM:"Bot",UTILITY:"Support",OTHER:"Other"};
const RANKED_QUEUES=[420];
const CASUAL_QUEUES=[400,430];

const RANK_BENCHMARKS={
  kda:{Iron:1.5,Bronze:1.8,Silver:2.1,Gold:2.5,Platinum:2.9,Emerald:3.3,Diamond:3.8,Master:4.2,Challenger:4.5},
  cspm:{Iron:3.5,Bronze:4.0,Silver:4.5,Gold:5.2,Platinum:5.8,Emerald:6.2,Diamond:6.6,Master:6.9,Challenger:7.0},
  dpm:{Iron:300,Bronze:400,Silver:500,Gold:620,Platinum:720,Emerald:800,Diamond:880,Master:950,Challenger:1000},
  kp:{Iron:40,Bronze:45,Silver:50,Gold:55,Platinum:58,Emerald:61,Diamond:64,Master:67,Challenger:70},
  vision:{Iron:12,Bronze:15,Silver:18,Gold:22,Platinum:26,Emerald:29,Diamond:32,Master:34,Challenger:35},
  vsSupport:{Iron:20,Bronze:25,Silver:30,Gold:36,Platinum:42,Emerald:48,Diamond:54,Master:60,Challenger:65},
};
const RANK_COLORS={Iron:"#8e7f6e",Bronze:"#cd7f32",Silver:"#9aa4af",Gold:"#c89b3c",Platinum:"#4fc99f",Emerald:"#34d399",Diamond:"#5fc4e8",Master:"#c084fc",Challenger:"#fbbf24"};

function kdaColor(v){return v>=4?"#34d399":v>=3?"#60a5fa":v>=2?"#9ca3af":"#f87171";}
function wrColor(v){return v>=60?"#34d399":v>=50?"#60a5fa":"#f87171";}
function tierColor(t){
  if(!t)return"#9ca3af";const s=t.toLowerCase();
  if(["challenger","grandmaster","master"].some(x=>s.includes(x)))return"#fbbf24";
  if(s.includes("diamond")||s.includes("emerald"))return"#67e8f9";
  if(s.includes("platinum"))return"#6ee7b7";
  if(s.includes("gold"))return"#fbbf24";
  if(s.includes("silver"))return"#d1d5db";
  if(s.includes("bronze"))return"#d97706";
  return"#a78bfa";
}
function masteryLabel(lvl){if(lvl>=7)return"✦✦✦";if(lvl>=6)return"✦✦";if(lvl>=5)return"✦";return"";}
function detectRole(rb){if(!rb||!rb.length)return"OTHER";return[...rb].sort((a,b)=>b.games-a.games)[0].role||"OTHER";}

function calcScore(matches,roleBreakdown){
  if(!matches||!matches.length)return 0;
  const role=detectRole(roleBreakdown);
  const n=matches.length;
  const tK=matches.reduce((a,m)=>a+m.kills,0);
  const tD=matches.reduce((a,m)=>a+m.deaths,0);
  const tA=matches.reduce((a,m)=>a+m.assists,0);
  const tCSPM=matches.reduce((a,m)=>a+m.cspm,0);
  const tKP=matches.reduce((a,m)=>a+m.kp,0);
  const tVS=matches.reduce((a,m)=>a+m.visionScore,0);
  const tDPM=matches.reduce((a,m)=>a+m.dpm,0);
  const avgKDA=tD===0?parseFloat((tK+tA).toFixed(2)):parseFloat(((tK+tA)/tD).toFixed(2));
  const avgCSPM=parseFloat((tCSPM/n).toFixed(2));
  const avgKP=Math.round(tKP/n);
  const avgVS=Math.round(tVS/n);
  const avgDPM=Math.round(tDPM/n);
  let s=0;
  if(role==="UTILITY"){
    s+=Math.min((avgKDA/3.5)*25,25);
    s+=Math.min((avgVS/55)*40,40);
    s+=Math.min((avgKP/55)*35,35);
  }else if(role==="JUNGLE"){
    s+=Math.min((avgKDA/4.5)*30,30);
    s+=Math.min((avgCSPM/5.0)*20,20);
    s+=Math.min((avgKP/70)*30,30);
    s+=Math.min((avgVS/35)*20,20);
  }else{
    s+=Math.min((avgKDA/4.5)*30,30);
    s+=Math.min((avgCSPM/7.0)*25,25);
    s+=Math.min((avgKP/75)*25,25);
    s+=Math.min((avgDPM/1000)*20,20);
  }
  return Math.round(s);
}

function scoreGrade(s){
  if(s>=80)return{g:"S",col:"#fbbf24",bg:"rgba(251,191,36,0.15)"};
  if(s>=65)return{g:"A",col:"#34d399",bg:"rgba(52,211,153,0.15)"};
  if(s>=50)return{g:"B",col:"#60a5fa",bg:"rgba(96,165,250,0.15)"};
  if(s>=35)return{g:"C",col:"#9ca3af",bg:"rgba(156,163,175,0.15)"};
  return{g:"D",col:"#f87171",bg:"rgba(248,113,113,0.15)"};
}

function toggleKey(){const i=document.getElementById("apiKey");i.type=i.type==="password"?"text":"password";}
function showError(m){const e=document.getElementById("error");e.textContent=m;e.style.display="block";}
function hideError(){document.getElementById("error").style.display="none";}
function toggle(id){
  const el=document.getElementById(id);if(!el)return;
  el.classList.toggle("open");
  const btn=document.getElementById("btn-"+id);
  if(btn)btn.querySelector("span:last-child").textContent=el.classList.contains("open")?"▲":"▼";
}
function closeModal(e){if(e.target===document.getElementById("modalOverlay"))document.getElementById("modalOverlay").style.display="none";}

let modalChartInstances=[];
function openScoreModal(idx,mode){
  const p=window._players[idx];if(!p||p._error)return;
  const matches=mode==="ranked"?p.rankedMatches:p.casualMatches;
  const score=mode==="ranked"?p.rankedScore:p.casualScore;
  const{g,col,bg}=scoreGrade(score);
  const role=detectRole(p.roleBreakdown);
  const modeLabel=mode==="ranked"?"Ranked Solo/Duo":"Casual SR";

  document.getElementById("modalGrade").textContent=`${g} ${score}`;
  document.getElementById("modalGrade").style.cssText=`color:${col};background:${bg};font-size:22px;font-weight:700;padding:6px 14px;border-radius:8px;margin-right:10px;`;
  document.getElementById("modalName").textContent=p.displayName;
  document.getElementById("modalRole").textContent=`${ROLE_LABELS[role]||role} · ${modeLabel} · last ${matches.length} games`;

  modalChartInstances.forEach(c=>c.destroy());
  modalChartInstances=[];

  const gameLabels=matches.map((_,i)=>`G${i+1}`);
  const isSupport=role==="UTILITY";

  const statConfigs=[
    {title:"KDA per game",data:matches.map(m=>m.kda),benchKey:"kda",color:"#60a5fa",unit:""},
    {title:"CS per minute",data:matches.map(m=>m.cspm),benchKey:"cspm",color:"#34d399",unit:"",skip:isSupport},
    {title:"Damage per minute",data:matches.map(m=>m.dpm),benchKey:"dpm",color:"#f87171",unit:"",skip:isSupport},
    {title:"Kill participation %",data:matches.map(m=>m.kp),benchKey:"kp",color:"#fbbf24",unit:"%"},
    {title:"Vision score",data:matches.map(m=>m.visionScore),benchKey:isSupport?"vsSupport":"vision",color:"#c084fc",unit:""},
    {title:"Win / Loss",data:matches.map(m=>m.result==="WIN"?1:0),color:"#9ca3af",unit:"",isBinary:true},
  ].filter(s=>!s.skip);

  const container=document.getElementById("modalCharts");
  container.innerHTML="";
  statConfigs.forEach((cfg,ci)=>{
    const cardDiv=document.createElement("div");
    cardDiv.className="modal-chart-card";
    const cid=`modal-chart-${ci}-${idx}-${mode}`;
    cardDiv.innerHTML=`<div class="modal-chart-title">${cfg.title}</div><div style="position:relative;height:160px"><canvas id="${cid}" role="img" aria-label="${cfg.title}"></canvas></div>${cfg.benchKey?`<div class="benchmark-legend" id="bench-${cid}"></div>`:""}`;
    container.appendChild(cardDiv);
    setTimeout(()=>{
      const ctx=document.getElementById(cid);if(!ctx)return;
      const datasets=[{label:cfg.title,data:cfg.data,borderColor:cfg.color,backgroundColor:cfg.color+"33",borderWidth:2,pointRadius:3,tension:0.3,fill:true}];
      if(cfg.benchKey&&RANK_BENCHMARKS[cfg.benchKey]){
        const benches=RANK_BENCHMARKS[cfg.benchKey];
        const showRanks=["Iron","Gold","Diamond","Challenger"];
        showRanks.forEach(rank=>{
          if(!benches[rank])return;
          datasets.push({label:rank,data:Array(gameLabels.length).fill(benches[rank]),borderColor:RANK_COLORS[rank],borderWidth:1,borderDash:[4,4],pointRadius:0,fill:false});
        });
        const legend=document.getElementById(`bench-${cid}`);
        if(legend)legend.innerHTML=showRanks.map(r=>`<span class="bench-item"><span class="bench-dot" style="background:${RANK_COLORS[r]}"></span>${r}: ${RANK_BENCHMARKS[cfg.benchKey][r]}${cfg.unit}</span>`).join("");
      }
      const chart=new Chart(ctx,{
        type:cfg.isBinary?"bar":"line",
        data:{labels:gameLabels,datasets},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:v=>`${v.dataset.label}: ${v.raw}${cfg.unit}`}}},scales:{x:{ticks:{color:"#6b7280",font:{size:10}},grid:{color:"rgba(255,255,255,0.04)"}},y:{ticks:{color:"#6b7280",font:{size:10}},grid:{color:"rgba(255,255,255,0.04)"},beginAtZero:cfg.isBinary,...(cfg.isBinary?{min:0,max:1,ticks:{callback:v=>v===1?"Win":"Loss"}}:{})}}}
      });
      modalChartInstances.push(chart);
    },50);
  });
  document.getElementById("modalOverlay").style.display="flex";
}

async function riotFetch(url,apiKey){
  const res=await fetch(url,{headers:{"X-Riot-Token":apiKey}});
  if(res.status===401)throw new Error("Invalid API key (401)");
  if(res.status===403)throw new Error(`Forbidden (403): ${url}`);
  if(res.status===404)throw new Error("Summoner not found — try Name#TAG (404)");
  if(res.status===429)throw new Error("Rate limit hit — wait a moment (429)");
  if(!res.ok)throw new Error(`Failed ${res.status}`);
  return res.json();
}

function processMatches(matchDetails,puuid,filterQueues){
  return matchDetails.map(m=>{
    if(filterQueues&&!filterQueues.includes(m.info.queueId))return null;
    const p=m.info.participants.find(x=>x.puuid===puuid);if(!p)return null;
    const dur=m.info.gameDuration/60||1;
    const teamKills=m.info.participants.filter(x=>x.teamId===p.teamId).reduce((a,x)=>a+x.kills,0);
    const kp=teamKills>0?Math.round(((p.kills+p.assists)/teamKills)*100):0;
    const kda=p.deaths===0?p.kills+p.assists:(p.kills+p.assists)/p.deaths;
    return{
      champion:p.championName,championId:p.championId,result:p.win?"WIN":"LOSS",
      kills:p.kills,deaths:p.deaths,assists:p.assists,
      cs:p.totalMinionsKilled+p.neutralMinionsKilled,
      cspm:parseFloat(((p.totalMinionsKilled+p.neutralMinionsKilled)/dur).toFixed(2)),
      dpm:Math.round(p.totalDamageDealtToChampions/dur),
      kda:parseFloat(kda.toFixed(2)),kp,visionScore:p.visionScore||0,
      role:p.teamPosition||"",matchId:m.metadata.matchId,queueId:m.info.queueId,
    };
  }).filter(Boolean);
}

async function fetchSummoner(name,apiKey,platform,routing){
  let puuid,summonerData,displayName;
  const parts=name.trim().split("#");
  if(parts.length===2){
    const acct=await riotFetch(`https://${routing}.api.riotgames.com/riot/account/v1/accounts/by-riot-id/${encodeURIComponent(parts[0])}/${encodeURIComponent(parts[1])}`,apiKey);
    puuid=acct.puuid;displayName=`${acct.gameName}#${acct.tagLine}`;
    summonerData=await riotFetch(`https://${platform}.api.riotgames.com/lol/summoner/v4/summoners/by-puuid/${puuid}`,apiKey);
  }else{
    summonerData=await riotFetch(`https://${platform}.api.riotgames.com/lol/summoner/v4/summoners/by-name/${encodeURIComponent(name.trim())}`,apiKey);
    puuid=summonerData.puuid;displayName=summonerData.name;
  }

  const[ranked,masteryRaw,rankedIds,casualIds]=await Promise.all([
    riotFetch(`https://${platform}.api.riotgames.com/lol/league/v4/entries/by-puuid/${puuid}`,apiKey),
    riotFetch(`https://${platform}.api.riotgames.com/lol/champion-mastery/v4/champion-masteries/by-puuid/${puuid}/top?count=5`,apiKey),
    riotFetch(`https://${routing}.api.riotgames.com/lol/match/v5/matches/by-puuid/${puuid}/ids?queue=420&start=0&count=10`,apiKey),
    riotFetch(`https://${routing}.api.riotgames.com/lol/match/v5/matches/by-puuid/${puuid}/ids?queue=400&start=0&count=5`,apiKey),
  ]);

  const solo=ranked.find(e=>e.queueType==="RANKED_SOLO_5x5")||null;
  const masteryMap={};masteryRaw.forEach(m=>{masteryMap[m.championId]={level:m.championLevel,points:m.championPoints};});

  // Also fetch blind queue for casual
  const blindIds=await riotFetch(`https://${routing}.api.riotgames.com/lol/match/v5/matches/by-puuid/${puuid}/ids?queue=430&start=0&count=5`,apiKey);
  const allCasualIds=[...new Set([...casualIds,...blindIds])].slice(0,10);

  const[rankedDetails,casualDetails]=await Promise.all([
    Promise.all(rankedIds.slice(0,10).map(id=>riotFetch(`https://${routing}.api.riotgames.com/lol/match/v5/matches/${id}`,apiKey))),
    Promise.all(allCasualIds.map(id=>riotFetch(`https://${routing}.api.riotgames.com/lol/match/v5/matches/${id}`,apiKey))),
  ]);

  const rankedMatches=processMatches(rankedDetails,puuid,null);
  const casualMatches=processMatches(casualDetails,puuid,null);
  const allMatches=[...rankedMatches,...casualMatches];

  // Role breakdown from all matches
  const roleMap={};
  allMatches.forEach(m=>{
    const r=m.role||"OTHER";
    if(!roleMap[r])roleMap[r]={games:0,wins:0,kills:0,deaths:0,assists:0,cspm:0,dpm:0};
    roleMap[r].games++;if(m.result==="WIN")roleMap[r].wins++;
    roleMap[r].kills+=m.kills;roleMap[r].deaths+=m.deaths;roleMap[r].assists+=m.assists;
    roleMap[r].cspm+=m.cspm;roleMap[r].dpm+=m.dpm;
  });
  const roleBreakdown=Object.entries(roleMap).map(([role,s])=>({
    role,games:s.games,winRate:Math.round((s.wins/s.games)*100),
    kda:s.deaths===0?parseFloat((s.kills+s.assists).toFixed(1)):parseFloat(((s.kills+s.assists)/s.deaths).toFixed(1)),
    cspm:parseFloat((s.cspm/s.games).toFixed(1)),dpm:Math.round(s.dpm/s.games),
  })).sort((a,b)=>b.games-a.games);

  // Stats from ranked for card display
  const src=rankedMatches.length?rankedMatches:allMatches;
  const n=src.length||1;
  const tK=src.reduce((a,m)=>a+m.kills,0),tD=src.reduce((a,m)=>a+m.deaths,0),tA=src.reduce((a,m)=>a+m.assists,0);
  const tCS=src.reduce((a,m)=>a+m.cs,0),tCSPM=src.reduce((a,m)=>a+m.cspm,0);
  const tKP=src.reduce((a,m)=>a+m.kp,0),tVS=src.reduce((a,m)=>a+m.visionScore,0),tDPM=src.reduce((a,m)=>a+m.dpm,0);
  const wins=src.filter(m=>m.result==="WIN").length;

  const champMap={};
  src.forEach(m=>{
    if(!champMap[m.champion])champMap[m.champion]={games:0,wins:0,kills:0,deaths:0,assists:0,championId:m.championId};
    champMap[m.champion].games++;if(m.result==="WIN")champMap[m.champion].wins++;
    champMap[m.champion].kills+=m.kills;champMap[m.champion].deaths+=m.deaths;champMap[m.champion].assists+=m.assists;
  });
  const topChamps=Object.entries(champMap).sort((a,b)=>b[1].games-a[1].games).slice(0,3).map(([name,s])=>({
    name,games:s.games,championId:s.championId,mastery:masteryMap[s.championId]||null,
    winRate:Math.round((s.wins/s.games)*100),
    kda:s.deaths===0?parseFloat((s.kills+s.assists).toFixed(2)):parseFloat(((s.kills+s.assists)/s.deaths).toFixed(2)),
  }));

  const rankedScore=calcScore(rankedMatches,roleBreakdown);
  const casualScore=calcScore(casualMatches,roleBreakdown);

  return{
    displayName,level:summonerData.summonerLevel,profileIconId:summonerData.profileIconId,
    puuid,platform,routing,apiKey,solo,
    winRate:Math.round((wins/n)*100),wins,losses:n-wins,
    avgKDA:tD===0?parseFloat((tK+tA).toFixed(2)):parseFloat(((tK+tA)/tD).toFixed(2)),
    avgKills:parseFloat((tK/n).toFixed(1)),avgDeaths:parseFloat((tD/n).toFixed(1)),avgAssists:parseFloat((tA/n).toFixed(1)),
    avgCSPM:parseFloat((tCSPM/n).toFixed(2)),avgKP:Math.round(tKP/n),avgVS:Math.round(tVS/n),
    avgDPM:Math.round(tDPM/n),avgCS:Math.round(tCS/n),
    topChamps,roleBreakdown,rankedMatches,casualMatches,rankedScore,casualScore,
  };
}

function renderCard(p,idx){
  const rankLabel=p.solo?`${p.solo.tier} ${p.solo.rank} — ${p.solo.leaguePoints} LP`:"Unranked";
  const playerColor=COLORS[idx%COLORS.length];
  const rGrade=scoreGrade(p.rankedScore);
  const cGrade=scoreGrade(p.casualScore);
  const champsHtml=p.topChamps.map(c=>{
    const m=c.mastery;
    const mLabel=m?`<span class="mastery-pip">${masteryLabel(m.level)} M${m.level}</span>`:"";
    return`<div class="champ-row">
      <img class="champ-icon" src="https://ddragon.leagueoflegends.com/cdn/14.10.1/img/champion/${c.name}.png" onerror="this.style.display='none'" alt="${c.name}">
      <span class="champ-name">${c.name}${mLabel}</span>
      <div class="champ-wr"><div style="color:${wrColor(c.winRate)};font-weight:500">${c.winRate}%</div><div style="color:${kdaColor(c.kda)};font-size:11px">${c.kda} KDA</div></div>
      <div class="wr-bar-wrap"><div class="wr-bar" style="width:${Math.min(c.winRate,100)}%;background:${wrColor(c.winRate)}"></div></div>
    </div>`;
  }).join("");
  const roleHtml=p.roleBreakdown.map(r=>`
    <div class="role-row">
      <span class="role-name">${ROLE_LABELS[r.role]||r.role} <span style="color:#4b5563">(${r.games}g)</span></span>
      <div class="role-stats">
        <div class="role-stat"><div class="role-stat-label">WR</div><div class="role-stat-val" style="color:${wrColor(r.winRate)}">${r.winRate}%</div></div>
        <div class="role-stat"><div class="role-stat-label">KDA</div><div class="role-stat-val" style="color:${kdaColor(r.kda)}">${r.kda}</div></div>
        <div class="role-stat"><div class="role-stat-label">CS/m</div><div class="role-stat-val">${r.cspm}</div></div>
        <div class="role-stat"><div class="role-stat-label">DMG/m</div><div class="role-stat-val">${r.dpm.toLocaleString()}</div></div>
      </div>
    </div>`).join("");
  const tlId=`tl-${idx}`,roleId=`role-${idx}`;
  const noRanked=!p.rankedMatches.length;
  const noCasual=!p.casualMatches.length;
  return`<div class="card">
    <div class="card-header">
      <img class="avatar" src="https://ddragon.leagueoflegends.com/cdn/14.10.1/img/profileicon/${p.profileIconId}.png" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt="">
      <div class="avatar-fb" style="display:none;border:2px solid ${playerColor}">${p.displayName[0].toUpperCase()}</div>
      <div style="flex:1"><div class="pname" style="color:${playerColor}">${p.displayName}</div><div class="plevel">Level ${p.level}</div></div>
      <div class="grades-wrap">
        <div class="grade-badge" style="color:${rGrade.col};background:${rGrade.bg}" onclick="openScoreModal(${idx},'ranked')" title="Ranked stats">
          ${noRanked?"—":rGrade.g}
          <div class="grade-label">Ranked</div>
          ${noRanked?"":` <div class="grade-score">${p.rankedScore}</div>`}
        </div>
        <div class="grade-badge" style="color:${cGrade.col};background:${cGrade.bg}" onclick="openScoreModal(${idx},'casual')" title="Casual SR stats">
          ${noCasual?"—":cGrade.g}
          <div class="grade-label">Casual</div>
          ${noCasual?"":` <div class="grade-score">${p.casualScore}</div>`}
        </div>
      </div>
    </div>
    <div class="rank-badge" style="color:${tierColor(p.solo?.tier)}">${rankLabel}</div>
    ${p.solo?`<div style="font-size:11px;color:#6b7280;margin-bottom:8px">${p.solo.wins}W ${p.solo.losses}L this season</div>`:""}
    <div class="stats-grid">
      <div class="stat"><div class="stat-label">Win Rate</div><div class="stat-val" style="color:${wrColor(p.winRate)}">${p.winRate}%</div></div>
      <div class="stat"><div class="stat-label">Avg KDA</div><div class="stat-val" style="color:${kdaColor(p.avgKDA)}">${p.avgKDA}</div></div>
      <div class="stat"><div class="stat-label">DMG/min</div><div class="stat-val">${p.avgDPM.toLocaleString()}</div></div>
      <div class="stat"><div class="stat-label">CS/min</div><div class="stat-val">${p.avgCSPM}</div></div>
      <div class="stat"><div class="stat-label">Kill Part.</div><div class="stat-val">${p.avgKP}%</div></div>
      <div class="stat"><div class="stat-label">Vision</div><div class="stat-val">${p.avgVS}</div></div>
    </div>
    <div style="font-size:12px;color:#6b7280;margin-bottom:6px">Top champions</div>
    ${champsHtml}
    <button class="expand-btn" id="btn-${roleId}" onclick="toggle('${roleId}')"><span>📍 Role breakdown</span><span>▼</span></button>
    <div class="collapsible" id="${roleId}">${roleHtml}</div>
    <button class="expand-btn" id="btn-tl-${idx}" onclick="toggleTimeline(${idx})"><span>📈 Death timeline</span><span>▼</span></button>
    <div class="collapsible" id="${tlId}">
      <div class="tl-loading" id="tl-loading-${idx}"><span class="spinner"></span> Loading…</div>
      <div class="chart-wrap" style="height:180px;display:none" id="tl-chart-wrap-${idx}">
        <canvas id="tl-chart-${idx}" role="img" aria-label="Death timeline"></canvas>
      </div>
    </div>
  </div>`;
}

const tlLoaded={};
async function toggleTimeline(idx){
  const wrap=document.getElementById(`tl-${idx}`);
  wrap.classList.toggle("open");
  const btn=document.getElementById(`btn-tl-${idx}`);
  if(btn)btn.querySelector("span:last-child").textContent=wrap.classList.contains("open")?"▲":"▼";
  if(!wrap.classList.contains("open")||tlLoaded[idx])return;
  tlLoaded[idx]=true;
  const p=window._players[idx];
  const matches=[...p.rankedMatches,...p.casualMatches].slice(0,5);
  try{
    const details=await Promise.all(matches.map(m=>riotFetch(`https://${p.routing}.api.riotgames.com/lol/match/v5/matches/${m.matchId}/timeline`,p.apiKey)));
    const dByMin={},kByMin={};
    details.forEach(tl=>{
      const pid=tl.metadata.participants.indexOf(p.puuid)+1;
      tl.info.frames.forEach(frame=>{
        const min=frame.timestamp/60000|0;
        frame.events.forEach(ev=>{
          if(ev.type==="CHAMPION_KILL"){
            if(ev.victimId===pid)dByMin[min]=(dByMin[min]||0)+1;
            if(ev.killerId===pid)kByMin[min]=(kByMin[min]||0)+1;
          }
        });
      });
    });
    const maxMin=Math.max(...Object.keys(dByMin).map(Number),...Object.keys(kByMin).map(Number),30);
    const labels=Array.from({length:maxMin+1},(_,i)=>i);
    document.getElementById(`tl-loading-${idx}`).style.display="none";
    const cw=document.getElementById(`tl-chart-wrap-${idx}`);cw.style.display="block";
    new Chart(document.getElementById(`tl-chart-${idx}`),{
      type:"bar",
      data:{labels:labels.map(l=>`${l}m`),datasets:[
        {label:"Deaths",data:labels.map(m=>dByMin[m]||0),backgroundColor:"rgba(248,113,113,0.7)",borderColor:"#f87171",borderWidth:1},
        {label:"Kills",data:labels.map(m=>kByMin[m]||0),backgroundColor:"rgba(52,211,153,0.7)",borderColor:"#34d399",borderWidth:1},
      ]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{color:"#9ca3af",boxWidth:12,font:{size:11}}}},scales:{x:{ticks:{color:"#6b7280",font:{size:10},maxTicksLimit:15},grid:{color:"rgba(255,255,255,0.05)"}},y:{ticks:{color:"#6b7280",stepSize:1},grid:{color:"rgba(255,255,255,0.05)"},beginAtZero:true}}}
    });
  }catch(e){document.getElementById(`tl-loading-${idx}`).textContent=`Could not load: ${e.message}`;}
}

let charts={};
function destroyCharts(){Object.values(charts).forEach(c=>c.destroy());charts={};}
function makeBar(id,labels,data,unit=""){
  const ctx=document.getElementById(id);if(!ctx)return;
  charts[id]=new Chart(ctx,{
    type:"bar",
    data:{labels,datasets:[{data,backgroundColor:COLORS.map(c=>c+"99"),borderColor:COLORS,borderWidth:1.5,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:v=>`${v.raw}${unit}`}}},scales:{x:{ticks:{color:"#9ca3af",font:{size:11}},grid:{display:false}},y:{ticks:{color:"#6b7280",font:{size:10}},grid:{color:"rgba(255,255,255,0.05)"},beginAtZero:true}}}
  });
}
function renderGraphs(players){
  destroyCharts();
  const labels=players.map(p=>p.displayName.split("#")[0]);
  makeBar("chartCS",labels,players.map(p=>p.avgCSPM));
  makeBar("chartDPM",labels,players.map(p=>p.avgDPM));
  makeBar("chartKDA",labels,players.map(p=>p.avgKDA));
  makeBar("chartKP",labels,players.map(p=>p.avgKP),"%");
  makeBar("chartVS",labels,players.map(p=>p.avgVS));
  makeBar("chartDeaths",labels,players.map(p=>p.avgDeaths));
  makeBar("chartScoreR",labels,players.map(p=>p.rankedScore));
  makeBar("chartScoreC",labels,players.map(p=>p.casualScore));
}

async function fetchAll(){
  const apiKey=document.getElementById("apiKey").value.trim();
  const[platform,routing]=document.getElementById("region").value.split("|");
  const names=[...document.querySelectorAll(".sname")].map(i=>i.value.trim()).filter(Boolean);
  if(!apiKey){showError("Please enter your Riot API key.");return;}
  if(!names.length){showError("Enter at least one summoner name.");return;}
  hideError();
  document.getElementById("output").style.display="none";
  document.getElementById("loading").style.display="block";
  document.getElementById("searchBtn").disabled=true;
  Object.keys(tlLoaded).forEach(k=>delete tlLoaded[k]);
  const players=[];
  for(let i=0;i<names.length;i++){
    document.getElementById("stepText").textContent=`Fetching ${names[i]} (${i+1}/${names.length})…`;
    try{
      const p=await fetchSummoner(names[i],apiKey,platform,routing);
      p.apiKey=apiKey;p.platform=platform;p.routing=routing;
      players.push({...p,_error:false});
    }catch(e){players.push({displayName:names[i],_error:true,_msg:e.message});}
  }
  window._players=players;
  document.getElementById("loading").style.display="none";
  document.getElementById("searchBtn").disabled=false;
  document.getElementById("cardsGrid").innerHTML=players.map((p,i)=>p._error
    ?`<div class="card"><div class="pname" style="color:#f87171">${p.displayName}</div><div style="font-size:13px;color:#f87171;margin-top:8px">${p._msg}</div></div>`
    :renderCard(p,i)
  ).join("");
  const good=players.filter(p=>!p._error);
  if(good.length)renderGraphs(good);
  document.getElementById("output").style.display="block";
}

function getTeams(){try{return JSON.parse(localStorage.getItem("lol_teams")||"{}");}catch{return{};}}
function saveTeamsLS(t){localStorage.setItem("lol_teams",JSON.stringify(t));}
function refreshTeamSelect(){
  const sel=document.getElementById("teamSelect");
  const cur=sel.value;const t=getTeams();
  sel.innerHTML='<option value="">— select a team —</option>';
  Object.keys(t).forEach(n=>{const o=document.createElement("option");o.value=n;o.textContent=n;if(n===cur)o.selected=true;sel.appendChild(o);});
}
function saveTeam(){
  const name=document.getElementById("teamName").value.trim();
  if(!name){showError("Enter a team name.");return;}
  const names=[...document.querySelectorAll(".sname")].map(i=>i.value.trim());
  if(names.every(n=>!n)){showError("Enter at least one summoner name.");return;}
  const t=getTeams();t[name]=names;saveTeamsLS(t);refreshTeamSelect();
  document.getElementById("teamName").value="";
  document.getElementById("teamSelect").value=name;hideError();
}
function loadTeam(){
  const name=document.getElementById("teamSelect").value;if(!name)return;
  const names=getTeams()[name]||[];
  document.querySelectorAll(".sname").forEach((inp,i)=>{inp.value=names[i]||"";});
}
function deleteTeam(){
  const name=document.getElementById("teamSelect").value;if(!name)return;
  const t=getTeams();delete t[name];saveTeamsLS(t);refreshTeamSelect();
}
refreshTeamSelect();
</script>
